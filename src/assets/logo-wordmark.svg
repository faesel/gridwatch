<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" width="320" height="48">
  <defs>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark (diamond node) -->
  <polygon points="24,2 46,24 24,46 2,24"
    fill="none" stroke="#00f5ff" stroke-width="2" filter="url(#glow-cyan)"/>
  <polygon points="24,11 37,24 24,37 11,24"
    fill="none" stroke="#00f5ff" stroke-width="1.2" filter="url(#glow-cyan)" opacity="0.7"/>

  <!-- Orange tick marks -->
  <line x1="24" y1="2" x2="24" y2="8" stroke="#ff6600" stroke-width="1.8" filter="url(#glow-orange)"/>
  <line x1="46" y1="24" x2="40" y2="24" stroke="#ff6600" stroke-width="1.8" filter="url(#glow-orange)"/>
  <line x1="24" y1="46" x2="24" y2="40" stroke="#ff6600" stroke-width="1.8" filter="url(#glow-orange)"/>
  <line x1="2" y1="24" x2="8" y2="24" stroke="#ff6600" stroke-width="1.8" filter="url(#glow-orange)"/>

  <!-- Centre dot -->
  <circle cx="24" cy="24" r="3" fill="#00f5ff" filter="url(#glow-cyan)"/>

  <!-- Wordmark: GRID in cyan, WATCH in orange -->
  <text
    x="60" y="33"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="26"
    font-weight="800"
    letter-spacing="5"
    text-rendering="geometricPrecision"
  >
    <tspan fill="#00f5ff" filter="url(#glow-cyan)">GRID</tspan><tspan fill="#ff6600" filter="url(#glow-orange)">WATCH</tspan>
  </text>

  <!-- Subtle underline accent -->
  <line x1="60" y1="39" x2="310" y2="39" stroke="#1a2a4a" stroke-width="1"/>
  <line x1="60" y1="39" x2="158" y2="39" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <line x1="158" y1="39" x2="310" y2="39" stroke="#ff6600" stroke-width="1" opacity="0.3"/>
</svg>
